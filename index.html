<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search"
    />
    <title>GifHub</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="navdiv">
        <div class="navlogo"><a href="#">GifHub</a></div>
        <ul>
          <li class="navlist"><a href="#">Forum</a></li>
          <li class="navlist"><a href="#">About</a></li>
        </ul>
      </div>
    </nav>
    <div class="title-search">
      <div class="body-title">
        <h1 class="bodymain-title">Hub for all the funny Gifs</h1>
        <h2 class="bodymain-subtitle">
          Simple Open Source Gifs for all the Bro
        </h2>
      </div>
      <div class="search-block">
        <form action="" class="search-form">
          <div class="search">
            <span class="material-symbols-outlined"> search </span>
            <input
              type="search"
              class="search-box"
              id="searchBar"
              placeholder="Search"
            />
          </div>
        </form>
      </div>
      <h2 class="feature-header">Feature Gifs</h2>
      <div class="gif-gallery" id="gifGallery">
        <div id="loadingSpinner" class="spinner" style="display: none"></div>
        <div id="gifResults"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
