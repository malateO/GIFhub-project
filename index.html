<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Linked stylesheet for clean separation of styles -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google icons for search symbol -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <title>GifHub</title>
  </head>
  <body>
    <!-- Navigation bar -->
    <nav class="navbar">
      <div class="navdiv">
        <!-- Logo-->
        <div class="navlogo"><a href="#">GifHub</a></div>
        <!-- Center Links -->
        <ul>
          <li class="navlist"><a href="#">Forum</a></li>
          <li class="navlist"><a href="#">About</a></li>
        </ul>
        <!-- Right edge login/signup icon-->
        <div class="auth-icon" onclick="openAuthPopup()">
          <span class="material-symbols-outlined">account_circle</span>
          <span id="loginStatus" class="login-status">Guest</span>
        </div>
      </div>
    </nav>
    <!-- Mains content wrapper -->
    <main>
      <div class="title-search">
        <section class="hero">
          <h1 class="bodymain-title">Hub for all the funny Gifs</h1>
          <h2 class="bodymain-subtitle">
            Simple Open Source Gifs for all the Bro
          </h2>
        </section>
      </div>
      <!-- Search bar -->
      <section class="search-block">
        <form class="search-form">
          <div class="search">
            <span class="material-symbols-outlined"> search </span>
            <input
              type="search"
              class="search-box"
              id="searchBar"
              placeholder="Search"
            />
          </div>
        </form>
      </section>
      <!-- Home section -->
      <section id="home-page">
        <section id="feature-section">
          <h2 class="feature-header">Feature Gifs</h2>
          <div class="gif-gallery" id="gifGallery">
            <div
              id="loadingSpinner"
              class="spinner"
              style="display: none"
            ></div>
            <div id="gifResults"></div>
          </div>
        </section>

        <section id="profile" style="display: none">
          <h2 class="feature-header">Your Account</h2>
          <h3 id="welcomeMessage">Welcome, Guess</h3>
          <p id="profileTagline"></p>
          <p id="profileEmail"></p>

          <button onclick="logout()" class="btn-logout">Logout</button>

          <h3>Your Favorites</h3>
          <div id="profileFavorites" class="grid"></div>
        </section>
      </section>
    </main>

    <section id="profile" style="display: none">
      <h2 class="feature-header">Your Account</h2>
      <h3 id="welcomeMessage">Welcome, Guess</h3>
      <p id="profileTagline"></p>
      <p id="profileEmail"></p>

      <button onclick="logout()" class="btn-logout">Logout</button>

      <h3>Your Favorites</h3>
      <div id="profileFavorites" class="grid"></div>
    </section>

    <div id="auth-popup" class="popup-overlay" style="display: none">
      <div class="popup-content satire-theme">
        <span class="close-btn" onclick="closeAuthPopup()">&times;</span>
        <h2>Welcome to GIFhub</h2>
        <p class="subtitle">Log in or sign up to save your funniest finds</p>
        <form onsubmit="handleAuth(event)">
          <input type="text" id="username" placeholder="Username" required />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <button type="submit" class="btn-login">Login</button>
          <button type="button" class="btn-signup" onclick="signup()">
            Signup
          </button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
