<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Linked stylesheet for clean separation of styles -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google icons for search symbol -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <title>GifHub</title>
  </head>
  <body>
    <!-- Navigation bar -->
    <nav class="navbar">
      <div class="navdiv">
        <!-- Logo-->
        <div class="navlogo"><a href="#">GifHub</a></div>
        <!-- Center Links -->
        <ul>
          <li class="navlist"><a href="#">Forum</a></li>
          <li class="navlist"><a href="#">About</a></li>
        </ul>
        <!-- Right edge login/signup icon-->
         <div class="auth-icon" onclick="openAuthPopup()"><span class="material-symbols-outlined">account_circle</span></div>
      </div>
    </nav>
    <!-- Main content wrapper -->
    <main>
      <div class="title-search">
        <section class="hero">
          <h1 class="bodymain-title">Hub for all the funny Gifs</h1>
          <h2 class="bodymain-subtitle">
            Simple Open Source Gifs for all the Bro
          </h2>
        </section>
        <!-- Search bar -->
        <section class="search-block">
          <form class="search-form">
            <div class="search">
              <span class="material-symbols-outlined"> search </span>
              <input
                type="search"
                class="search-box"
                id="searchBar"
                placeholder="Search"
              />
            </div>
          </form>
        </section>
        <!-- Home section -->
        <section id="home-page">
          <h2 class="feature-header">Feature Gifs</h2>
          <div class="gif-gallery" id="gifGallery">
            <div
              id="loadingSpinner"
              class="spinner"
              style="display: none"
            ></div>
            <div id="gifResults"></div>
          </div>
        </section>
        <!-- Favorites section remove for now-->
        <!-- <section>
          <h2 class="feature-header">Favorites</h2>
          <div id="favorites"></div>
        </section> -->
        <!-- Profile section remove for now-->
      <!-- <section id="profile" style="display: none;">
        <h2 class="feature-header">Profile</h2>
        <h3>Your Saved Gif</h3>
        <div id="profileFavorites"></div>
      </section> -->
    </main>

    <script src="script.js"></script>
    <!-- Login/Signup Popup/modal-->
     <div id="auth-popup" class="popup-overlay" style="display: none;">
      <div class="popup-content">
        <span class="close-btn" onclick="closeAuthPopup()">&times;</span>
        <h2>Login / Signup</h2>
        <form onsubmit="handleAuth(event)">
          <label for="username">Username:</label>
          <input type="text" id="username" required>

          <label for="password">Password:</label>
          <input type="text" id="password" required>

          <button type="submit">Login</button>
          <button type="button" onclick="signup()">Signup</button>
        </form>
      </div>
     </div>
  </body>
</html>
