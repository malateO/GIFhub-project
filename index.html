<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Linked stylesheet for clean separation of styles -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google icons for search symbol -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search"
    />
    <title>GifHub</title>
  </head>
  <body>
    <!-- Navigation bar -->
    <nav class="navbar">
      <div class="navdiv">
        <div class="navlogo"><a href="#">GifHub</a></div>
        <ul>
          <li class="navlist"><a href="#">Forum</a></li>
          <li class="navlist"><a href="#">About</a></li>
        </ul>
      </div>
    </nav>
    <!-- Main content wrapper -->
    <main>
      <div class="title-search">
        <section class="hero">
          <h1 class="bodymain-title">Hub for all the funny Gifs</h1>
          <h2 class="bodymain-subtitle">
            Simple Open Source Gifs for all the Bro
          </h2>
        </section>
        <!-- Search bar -->
        <section class="search-block">
          <form class="search-form">
            <div class="search">
              <span class="material-symbols-outlined"> search </span>
              <input
                type="search"
                class="search-box"
                id="searchBar"
                placeholder="Search"
              />
            </div>
          </form>
        </section>
        <!-- Gallery section -->
        <section>
          <h2 class="feature-header">Feature Gifs</h2>
          <div class="gif-gallery" id="gifGallery">
            <div
              id="loadingSpinner"
              class="spinner"
              style="display: none"
            ></div>
            <div id="gifResults"></div>
          </div>
        </section>
        <!-- Favorites section -->
        <section>
          <h2 class="feature-header">Favorites</h2>
          <div id="favorites"></div>
        </section>
        <!-- Profile section -->
      <section id="profile" style="display: none;">
        <h2 class="feature-header">Profile</h2>
        <h3>Your Saved Gif</h3>
        <div id="profileFavorites"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
